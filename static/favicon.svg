<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Portlane">
  <title>Portlane</title>
  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="#18181b"/>
  <!-- P lettermark: vertical stem + bowl -->
  <!-- Stem -->
  <rect x="10" y="8" width="3.5" height="16" rx="1.5" fill="white"/>
  <!-- Bowl top bar -->
  <rect x="10" y="8" width="10" height="3.5" rx="1.5" fill="white"/>
  <!-- Bowl bottom bar -->
  <rect x="10" y="16.5" width="10" height="3.5" rx="1.5" fill="white"/>
  <!-- Bowl right side -->
  <rect x="18.5" y="8" width="3.5" height="12" rx="1.5" fill="white"/>
  <!-- Accent dot -->
  <circle cx="22" cy="25" r="2.5" fill="#7c3aed"/>
</svg>
