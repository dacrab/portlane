name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: >
          curl -fsS '${{ secrets.PUBLIC_SUPABASE_URL }}/rest/v1/'
          -H "apikey: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
