name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: dopplerhq/cli-action@v4
      - run: |
          URL="$(doppler secrets get PUBLIC_SUPABASE_URL --plain)"
          KEY="$(doppler secrets get PUBLIC_SUPABASE_PUBLISHABLE_KEY --plain)"
          curl -sS -o /dev/null "$URL/rest/v1/" -H "apikey: $KEY"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
