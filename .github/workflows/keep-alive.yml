name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: DopplerHQ/cli-action@4819d80694e35a3b2e06c5c94ef966853c73c489 # v4

      - run: >
          doppler run -- curl -fsS '$PUBLIC_SUPABASE_URL/rest/v1/'
          -H "apikey: $SUPABASE_SECRET_KEY"
        env:
          DOPPLER_CONFIG: prd_app
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
