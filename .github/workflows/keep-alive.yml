name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: dopplerhq/cli-action@v4
      - run: doppler run -- curl -fsS "$PUBLIC_SUPABASE_URL/rest/v1/" -H "apikey: $SUPABASE_SECRET_KEY"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
